# Perfil de test: base de datos H2 en memoria, sin Flyway y sin Eureka.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
